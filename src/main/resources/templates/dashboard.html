<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <th:block th:replace="~{fragments/head :: head}"></th:block>
    <script>
        if(localStorage.getItem("sidebarCollapsed") === "true")
        {
            document.documentElement.classList.add("sidebar-collapsed");
        }
    </script>
    <title>
        Dashboard
    </title>

</head>


<body>


<div class="wrapper">


    <!-- SIDEBAR -->

    <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>



    <!-- MAIN -->

    <div class="main container-fluid">



        <!-- TOPBAR -->

        <th:block th:replace="~{fragments/topbar :: topbar}"></th:block>




        <!-- STATS -->
        <div class="row mt-4 g-4">

            <!-- TOTAL -->
            <div class="col-md-4">
                <div class="stat-card stat-total">

                    <div class="stat-icon">
                        <i class="bi bi-list-check"></i>
                    </div>

                    <div class="stat-info">

                        <div class="stat-title">
                            Total Tasks
                        </div>

                        <div class="stat-value"
                            th:text="${pendingTasks.size() + completedTasks.size()}">
                        </div>

                    </div>

                </div>
            </div>


            <!-- PENDING -->
            <div class="col-md-4">
                <div class="stat-card stat-pending">

                    <div class="stat-icon">
                        <i class="bi bi-hourglass-split"></i>
                    </div>

                    <div class="stat-info">

                        <div class="stat-title">
                            Pending
                        </div>

                        <div class="stat-value"
                            th:text="${pendingTasks.size()}">
                        </div>

                    </div>

                </div>
            </div>


            <!-- COMPLETED -->
            <div class="col-md-4">
                <div class="stat-card stat-completed">

                    <div class="stat-icon">
                        <i class="bi bi-check-circle"></i>
                    </div>

                    <div class="stat-info">

                        <div class="stat-title">
                            Completed
                        </div>

                        <div class="stat-value"
                            th:text="${completedTasks.size()}">
                        </div>

                    </div>

                </div>
            </div>

        </div>



        <!-- SEARCH -->

        <div class="mt-4">

            <input id="search"
                   class="form-control"
                   placeholder="Search tasks...">

        </div>




        <!-- PENDING TASKS HEADER -->

        <div class="section-header mt-4">

            <div class="section-title">
                Pending Tasks
            </div>

            <div class="section-count"
                 th:text="${pendingTasks.size()} + ' tasks'">
            </div>

        </div>


        <!-- PENDING TASK LIST -->

        <div class="task-list">

            <div class="task-row"
                 th:each="task : ${pendingTasks}">

                <div class="task-left">

                    <div class="task-title"
                         th:text="${task.title}">
                    </div>

                    <div class="task-date">

                        <span th:text="${task.dueDate}"></span>

                        <span class="task-badge"
                              th:text="${task.remainingText}"
                              th:classappend="' ' + ${task.remainingClass}">
                        </span>

                    </div>

                </div>


                <div class="task-actions">

                    <button class="action-btn complete-btn"
                            data-tooltip="Complete"
                            th:onclick="|toggleTask(${task.id})|">

                        <i class="bi bi-check-lg"></i>

                    </button>

                    <button class="action-btn delete-btn"
                            data-tooltip="Delete"
                            th:onclick="|deleteTask(${task.id})|">

                        <i class="bi bi-trash"></i>

                    </button>


                </div>

            </div>

        </div>

        <!-- COMPLETED HEADER -->

        <div class="section-header mt-4">

            <div class="section-title">
                Completed Tasks
            </div>

            <div class="section-count"
                 th:text="${completedTasks.size()} + ' tasks'">
            </div>

        </div>


        <!-- COMPLETED LIST -->

        <div class="task-list">

            <div class="task-row completed"
                 th:each="task : ${completedTasks}">

                <div class="task-left">

                    <div class="task-title">

                        <strike th:text="${task.title}"></strike>

                    </div>

                    <div class="task-date"
                         th:text="${task.dueDate}">
                    </div>

                </div>

                <div class="task-actions">

                    <button class="action-btn undo-btn"
                            data-tooltip="Undo"
                            th:onclick="|toggleTask(${task.id})|">

                        <i class="bi bi-arrow-counterclockwise"></i>

                    </button>

                    <button class="action-btn delete-btn"
                            data-tooltip="Delete"
                            th:onclick="|deleteTask(${task.id})|">

                        <i class="bi bi-trash"></i>

                    </button>

                </div>

            </div>

        </div>

    </div>


</div>




<!-- FLOAT BUTTON -->


<button class="btn btn-success floating-btn shadow"

        data-bs-toggle="modal"

        data-bs-target="#addModal">

    +

</button>




<!-- ADD TASK MODAL -->


<th:block th:replace="~{fragments/add-task-modal :: add-task-modal}"></th:block>




<!-- JS -->


<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>



</body>

</html>
