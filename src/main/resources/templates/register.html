<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Register</title>

    <link rel="stylesheet"
        th:href="@{/css/register.css}">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body>

    <div class="teal-bg"></div>

    <div class="center-container">

        <div class="signup-card">

            <div class="brand">
                YourTodo
            </div>

            <div class="subtitle">
                Create account
            </div>

            <form id="registerForm"
                method="post"
                action="/register"
                th:object="${user}">
                <div th:if="${error}" class="helper-text invalid" style="margin-bottom:10px;">
                    <span th:text="${error}"></span>
                </div>

                <input type="text"
                    th:field="*{fullName}"
                    class="form-control mb-3"
                    placeholder="Full Name"
                    required>

                <input type="email"
                    th:field="*{email}"
                    class="form-control mb-3"
                    placeholder="Email"
                    required>
                <div class="helper-text invalid"
                    th:if="${#fields.hasErrors('email')}"
                    th:errors="*{email}">
                </div>

                <input type="text"
                    th:field="*{username}"
                    id="username"
                    class="form-control"
                    placeholder="Username"
                    required>

                <div id="usernameStatus"
                    class="helper-text hidden">
                </div>

                <input type="password"
                    th:field="*{password}"
                    id="password"
                    class="form-control mt-3"
                    placeholder="Password"
                    required>

                <div id="passwordRules"
                    class="helper-text hidden">

                    <div id="rule-length">
                        • 8 characters
                    </div>

                    <div id="rule-letter">
                        • Letter
                    </div>

                    <div id="rule-number">
                        • Number
                    </div>

                    <div id="rule-special">
                        • Special character
                    </div>

                </div>

                <input type="password"
                    th:field="*{confirmPassword}"
                    id="confirmPassword"
                    class="form-control mt-3"
                    placeholder="Confirm Password"
                    required>

                <div id="matchStatus"
                    class="helper-text hidden">
                </div>

                <button id="submitBtn"
                        
                        class="btn signup-btn w-100 mt-3"
                        disabled>

                    Sign Up

                </button>

            </form>

        </div>

    </div>

    <script th:src="@{/js/register.js}"></script>

</body>

</html>
