<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Login - Todo App</title>


    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">


    <!-- Bootstrap Icons -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <!-- Lottie Player -->

    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <!-- Premium Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
          rel="stylesheet">

    <style>

        body {

            height: 100vh;

            margin: 0;

            font-family: 'poppins', sans-serif;

        }


        /* LEFT SIDE */


        .left-side {

            background: linear-gradient(135deg, #0f766e, #5eead4);

            color: white;

            display: flex;

            flex-direction: column;

            justify-content: center;

            align-items: center;

            text-align: center;

            padding: 60px;

        }


        .brand {

            font-size: 48px;

            font-weight: 700;

            background: linear-gradient(90deg, #ffffff, #bbf7d0);

            background-clip: text;

            -webkit-background-clip: text;

            -webkit-text-fill-color: transparent;

            text-shadow: 0 0 20px rgba(255,255,255,0.3);

            animation: fadeSlideDown 1s ease;

        }


        .tagline {

            font-size: 18px;

            margin-top: 20px;

            max-width: 420px;

            opacity: 0.9;

            animation: fadeSlideUp 1.2s ease;

        }


        /* RIGHT SIDE */


        .right-side {

            display: flex;

            justify-content: center;

            align-items: center;

            background: #f8f9fa;

        }


        .login-card {

            width: 100%;

            max-width: 400px;

            padding: 40px;

            border-radius: 15px;

            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);

            background: white;

        }

        @keyframes fadeSlideDown {

                from {

                    opacity: 0;

                transform: translateY(-30px);

            }

            to {

                opacity: 1;

                transform: translateY(0);

            }

        }

        @keyframes fadeSlideUp {

            from {

                opacity: 0;

                transform: translateY(30px);

            }

            to {

                opacity: 1;

                transform: translateY(0);

            }

        }

    </style>


</head>


<body>


    <div class="container-fluid h-100">


        <div class="row h-100">


            <!-- LEFT SIDE -->


            <div class="col-lg-7 d-none d-lg-flex left-side">


                <div>


                    <div class="brand">

                        YourTodo

                    </div>


                    <div class="tagline">

                        Elevate your productivity with YourTodo,
                        the sleek todo list app designed to keep you organized and on track.

                    </div>

                    <!--ToDo Animation-->
                    <div class="mt-4">
                        <lottie-player
                            th:src="@{/animations/todo.json}"
                            background="transparent"
                            speed="1"
                            style="width: 350px; height: 350px;"
                            loop
                            autoplay>
                        </lottie-player>
                    </div>


                </div>


            </div>



            <!-- RIGHT SIDE -->


            <div class="col-lg-5 col-12 right-side">


                <div class="login-card">


                    <h3 class="text-center mb-4 text-success">

                        Welcome

                    </h3>


                    <p class="text-center text-muted">

                        Please enter your username and password

                    </p>



                    <!-- ERROR MESSAGE -->


                    <div th:if="${param.error}"
                         class="alert alert-danger">

                        Invalid username or password

                    </div>


                    <div th:if="${param.logout}"
                         class="alert alert-success">

                        Logged out successfully

                    </div>



                    <form method="post"
                          action="/login">


                        <div class="mb-3">


                            <label class="form-label">

                                Username

                            </label>


                            <div class="input-group">


                                <span class="input-group-text">

                                    <i class="bi bi-person"></i>

                                </span>


                                <input type="text"
                                       name="username"
                                       class="form-control"
                                       required>


                            </div>


                        </div>



                        <div class="mb-3">


                            <label class="form-label">

                                Password

                            </label>


                            <div class="input-group">


                                <span class="input-group-text">

                                    <i class="bi bi-lock"></i>

                                </span>


                                <input type="password"
                                       name="password"
                                       class="form-control"
                                       required>


                            </div>


                        </div>



                        <div class="d-grid">


                            <button class="btn btn-success">

                                Login

                            </button>


                        </div>


                    </form>



                    <hr>



                    <p class="text-center">


                        Don't have an account?


                        <a href="/register">

                            Register

                        </a>


                    </p>



                </div>


            </div>


        </div>


    </div>


</body>


</html>
